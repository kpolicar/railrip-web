<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 — Docs — RailRip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg-primary: #07070d;
  --bg-secondary: #0e0e1a;
  --accent: #ff6b35;
  --accent-glow: rgba(255,107,53,0.25);
  --text-primary: #e8e8f0;
  --text-secondary: #9999b0;
  --text-muted: #666680;
  --border: #1e1e35;
  --red: #f87171;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -20%; left: 50%; transform: translateX(-50%);
  width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(255,107,53,0.04) 0%, transparent 70%);
  pointer-events: none;
}

/* Subtle grid */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* Nav */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,7,13,0.85);
  backdrop-filter: blur(12px);
}
.nav-logo {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--text-primary);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo i { color: var(--accent); }
.nav-logo span { color: var(--accent); }
.nav-back {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--text-primary); }

/* Main content */
.error-container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px 24px;
  max-width: 600px;
}

.error-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.25);
  color: var(--red);
  border-radius: 100px;
  padding: 7px 18px;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.error-code {
  font-size: clamp(6rem, 14vw, 9rem);
  font-weight: 900;
  letter-spacing: -4px;
  line-height: 1;
  color: var(--text-primary);
  position: relative;
  margin-bottom: 8px;
}
.error-code::before {
  content: '403';
  position: absolute;
  inset: 0;
  color: var(--accent);
  filter: blur(32px);
  opacity: 0.18;
  z-index: -1;
}

.error-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.error-desc {
  font-size: 1rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 40px;
}
.error-desc strong { color: var(--text-primary); }

.lock-icon {
  width: 80px; height: 80px;
  border-radius: 20px;
  background: rgba(248,113,113,0.07);
  border: 1px solid rgba(248,113,113,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  color: var(--red);
  margin: 0 auto 36px;
}

.actions {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: #fff;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 13px 28px;
  border-radius: 8px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: opacity 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(255,107,53,0.3);
}
.btn-primary:hover { opacity: 0.88; box-shadow: 0 4px 28px rgba(255,107,53,0.5); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.btn-ghost:hover { color: var(--text-primary); border-color: #333355; }

/* Train stripe */
.train-stripe {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 24px, transparent 24px, transparent 32px);
  opacity: 0.35;
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <i class="fas fa-train-subway"></i>
    Rail<span>Rip</span>
  </a>
  <a href="index.html" class="nav-back">
    <i class="fas fa-arrow-left"></i>
    Back to home
  </a>
</nav>

<div class="error-container">
  <div class="error-badge">
    <i class="fas fa-lock"></i>
    Restricted Access
  </div>
  <div class="lock-icon">
    <i class="fas fa-lock"></i>
  </div>
  <div class="error-code">403</div>
  <div class="error-title">Documentation is for paying customers only</div>
  <div class="error-desc">
    The <strong>RailRip API documentation</strong> is exclusively available to active subscribers.
    Upgrade your plan to unlock full technical documentation, code samples, and integration guides.
  </div>
  <div class="actions">
    <a href="register.html" class="btn-primary">
      <i class="fas fa-bolt"></i>
      Get API Access
    </a>
    <a href="index.html" class="btn-ghost">
      <i class="fas fa-house"></i>
      Learn More
    </a>
  </div>
</div>

<div class="train-stripe"></div>
</body>
</html>
